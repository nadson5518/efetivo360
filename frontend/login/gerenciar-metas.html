<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Efetivo360 | Gerenciar Metas</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body class="app-body">
  <header class="app-header">
    <div class="header-left">
      <img src="assets/logo-efetivo360.png" alt="Efetivo360" />
      <span class="page-title">Gerenciar Metas</span>
    </div>
    <div class="header-right">
      <span class="user-name" id="metaUserNome">Usuário</span>
      <span class="user-role">Líder</span>
    </div>
  </header>

  <main class="dashboard-container">
    <h1>Metas</h1>
    <p class="subtitle">Cadastre e acompanhe metas reais da sua disciplina.</p>

    <section class="request-card">
      <h2>Nova Meta</h2>
      <form id="metaForm">
        <div class="form-group">
          <label for="metaTitulo">Título</label>
          <input id="metaTitulo" type="text" placeholder="Ex: Meta diária de pintura" required />
        </div>
        <div class="form-group">
          <label for="metaPeriodo">Período</label>
          <select id="metaPeriodo" required>
            <option value="">Selecione</option>
            <option value="Diária">Diária</option>
            <option value="Semanal">Semanal</option>
            <option value="Mensal">Mensal</option>
          </select>
        </div>
        <div class="adjust-grid">
          <div class="form-group">
            <label for="metaValor">Valor da Meta</label>
            <input id="metaValor" type="number" min="1" required />
          </div>
          <div class="form-group">
            <label for="metaAtual">Valor Atual</label>
            <input id="metaAtual" type="number" min="0" value="0" />
          </div>
        </div>
        <div class="form-actions">
          <button type="button" class="secondary-btn" id="metaCancelar">Cancelar</button>
          <button type="submit" class="primary-btn">Salvar Meta</button>
        </div>
      </form>
    </section>

    <section class="goals-section">
      <h2>📊 Metas Cadastradas</h2>
      <div class="goals-list" id="metasLista"></div>
    </section>
  </main>

  <script src="gerenciar-metas.js"></script>
</body>
</html>
