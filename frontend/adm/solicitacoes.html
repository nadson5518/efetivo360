<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Efetivo360 | Solicitações</title>
  <link rel="stylesheet" href="../login/style.css" />
</head>

<body class="app-body">
  <header class="app-header">
    <div class="header-left">
      <img src="../login/assets/logo-efetivo360.png" alt="Efetivo360" />
      <span class="page-title">Solicitações</span>
    </div>
    <div class="header-right">
      <span class="user-name" id="admNome">Administrador</span>
      <span class="user-role">ADM</span>
    </div>
  </header>

  <main class="dashboard-container">
    <h1>Solicitações</h1>
    <p class="subtitle">Aprovação e controle das solicitações enviadas por líderes e colaboradores.</p>

    <section class="filter-bar compact">
      <select class="filter-select compact" id="filtroStatus">
        <option value="">Status</option>
        <option>Pendente</option>
        <option>Aprovada</option>
        <option>Reprovada</option>
      </select>
      <button class="secondary-btn small compact" id="btnFiltrar">Filtrar</button>
    </section>

    <section class="table-card">
      <table class="data-table">
        <thead>
          <tr>
            <th>Data</th>
            <th>Solicitante</th>
            <th>Tipo</th>
            <th>Descrição</th>
            <th>Status</th>
            <th>Ações</th>
          </tr>
        </thead>
        <tbody id="solicitacoesTabela"></tbody>
      </table>
    </section>
  </main>

  <script src="solicitacoes.js"></script>
</body>
</html>
