<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Efetivo360 | Disciplinas</title>
  <link rel="stylesheet" href="../login/style.css" />
</head>

<body class="app-body">

  <!-- HEADER -->
  <header class="app-header">
    <div class="header-left">
      <img src="../login/assets/logo-efetivo360.png" alt="Efetivo360" />
      <span class="page-title">Disciplinas</span>
    </div>

    <div class="header-right">
      <span class="user-name">Administrador</span>
      <span class="user-role">ADM</span>
    </div>
  </header>

  <!-- CONTEÚDO -->
  <main class="dashboard-container">

    <h1>Disciplinas</h1>
    <p class="subtitle">
      Cadastro e controle das disciplinas do sistema
    </p>

    <!-- AÇÕES -->
    <section class="user-actions">
      <button class="primary-btn">➕ Nova Disciplina</button>
    </section>

    <!-- LISTA -->
    <section class="table-card">

      <table class="data-table">
        <thead>
          <tr>
            <th>Disciplina</th>
            <th>Status</th>
            <th>Ações</th>
          </tr>
        </thead>

        <tbody>
          <tr>
            <td>Pintura</td>
            <td><span class="status-badge ativo">Ativa</span></td>
            <td class="actions">✏️ 🔒</td>
          </tr>

          <tr>
            <td>Montagem</td>
            <td><span class="status-badge ativo">Ativa</span></td>
            <td class="actions">✏️ 🔒</td>
          </tr>

          <tr>
            <td>Soldagem</td>
            <td><span class="status-badge inativo">Inativa</span></td>
            <td class="actions">✏️</td>
          </tr>
        </tbody>

      </table>

    </section>

  </main>

</body>
</html>
