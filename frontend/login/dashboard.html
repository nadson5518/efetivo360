<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Efetivo360 | Dashboard</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body class="app-body">

  <!-- HEADER -->
  <header class="app-header">
    <div class="header-left">
      <img src="assets/logo-efetivo360.png" alt="Efetivo360" />
      <span class="page-title">Dashboard</span>
    </div>

    <div class="header-right">
      <span class="user-name">Usuário Exemplo</span>
      <span class="user-role">Líder</span>
    </div>
  </header>

  <!-- CONTEÚDO PRINCIPAL -->
  <main class="dashboard-container">
    <h1>Dashboard</h1>
    <p class="subtitle">Acesso rápido às principais funções</p>

    <div class="dashboard-cards">

      <div class="card">
        <span class="card-icon">📌</span>
        <h2>Meu Status</h2>
      </div>

      <div class="card">
        <span class="card-icon">📊</span>
        <h2>Histórico</h2>
      </div>

      <div class="card">
        <span class="card-icon">👷</span>
        <h2>Painel do Líder</h2>
      </div>

    </div>
  </main>

</body>
</html>
