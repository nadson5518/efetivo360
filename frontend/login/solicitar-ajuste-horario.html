<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Efetivo360 | Solicitar Ajuste de Horário</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body class="app-body">
  <header class="app-header">
    <div class="header-left">
      <img src="assets/logo-efetivo360.png" alt="Efetivo360" />
      <span class="page-title">Solicitar Ajuste de Horário</span>
    </div>
    <div class="header-right">
      <span class="user-name" id="ajusteUserNome">Usuário</span>
      <span class="user-role">Líder</span>
    </div>
  </header>

  <main class="dashboard-container">
    <h1>Ajuste de Horário e Status</h1>
    <p class="subtitle">Solicite correção de horário e/ou status lançado incorretamente.</p>

    <section class="adjust-card">
      <form id="ajusteForm">
        <div class="form-group">
          <label for="ajusteColaborador">Colaborador</label>
          <input id="ajusteColaborador" type="text" placeholder="Nome ou matrícula do colaborador" required />
        </div>

        <div class="form-group">
          <label for="ajusteData">Data de Referência</label>
          <input id="ajusteData" type="date" required />
        </div>

        <div class="form-group">
          <label for="ajusteHorarioLancado">Horário Lançado (atual)</label>
          <input id="ajusteHorarioLancado" type="text" placeholder="Ex: Entrada 07:12" required />
        </div>

        <div class="form-group">
          <label for="ajusteTipo">Tipo de Ajuste</label>
          <select id="ajusteTipo" required>
            <option value="">Selecione</option>
            <option>Entrada</option>
            <option>Saída</option>
            <option>Entrada e Saída</option>
            <option>Status</option>
          </select>
        </div>

        <div class="adjust-grid">
          <div class="form-group">
            <label for="ajusteEntradaCorreta">Entrada Correta</label>
            <input id="ajusteEntradaCorreta" type="time" />
          </div>

          <div class="form-group">
            <label for="ajusteSaidaCorreta">Saída Correta</label>
            <input id="ajusteSaidaCorreta" type="time" />
          </div>
        </div>

        <div class="form-group">
          <label for="ajusteStatus">Status Correto no Período</label>
          <select id="ajusteStatus">
            <option value="">Selecione o status</option>
            <option>Em Serviço</option>
            <option>Almoço</option>
            <option>Paralisação</option>
            <option>Almoxarifado</option>
            <option>Falta</option>
            <option>Folga</option>
          </select>
        </div>

        <div class="form-group stop-reason-inline">
          <label for="ajusteMotivoParalisacao">Motivo da Paralisação</label>
          <select id="ajusteMotivoParalisacao">
            <option value="">Selecione o motivo</option>
            <option>Chuva</option>
            <option>Falta de material</option>
            <option>Liberação de área</option>
            <option>Problema com equipamento</option>
            <option>Orientação da segurança</option>
          </select>
        </div>

        <div class="form-group">
          <label for="ajusteDescricao">Motivo da Solicitação</label>
          <textarea id="ajusteDescricao" placeholder="Explique detalhadamente o ajuste solicitado" required></textarea>
        </div>

        <div class="form-actions">
          <button class="secondary-btn" type="button" id="ajusteCancelar">Cancelar</button>
          <button class="primary-btn" type="submit">Enviar Solicitação</button>
        </div>
      </form>
    </section>
  </main>

  <script src="solicitar-ajuste-horario.js"></script>
</body>
</html>
