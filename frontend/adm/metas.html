<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Efetivo360 | Metas</title>
  <link rel="stylesheet" href="../login/style.css" />
</head>

<body class="app-body">
  <header class="app-header">
    <div class="header-left">
      <img src="../login/assets/logo-efetivo360.png" alt="Efetivo360" />
      <span class="page-title">Metas</span>
    </div>
    <div class="header-right">
      <span class="user-name" id="admNome">Administrador</span>
      <span class="user-role">ADM</span>
    </div>
  </header>

  <main class="dashboard-container">
    <h1>Gerenciar Metas</h1>
    <p class="subtitle">Metas cadastradas por disciplina e por líder.</p>

    <section class="table-card">
      <table class="data-table">
        <thead>
          <tr>
            <th>Título</th>
            <th>Disciplina</th>
            <th>Líder</th>
            <th>Período</th>
            <th>Meta</th>
            <th>Realizado</th>
            <th>Cumprimento</th>
          </tr>
        </thead>
        <tbody id="metasTabela"></tbody>
      </table>
    </section>
  </main>

  <script src="metas.js"></script>
</body>
</html>
