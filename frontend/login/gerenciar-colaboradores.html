<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Efetivo360 | Gerenciar Colaboradores</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body class="app-body">
  <header class="app-header">
    <div class="header-left">
      <img src="assets/logo-efetivo360.png" alt="Efetivo360" />
      <span class="page-title">Gerenciar Colaboradores</span>
    </div>
    <div class="header-right">
      <span class="user-name" id="equipeUserNome">Usuário</span>
      <span class="user-role">Líder</span>
    </div>
  </header>

  <main class="dashboard-container">
    <h1>Minha Equipe</h1>
    <p class="subtitle">Visualize colaboradores vinculados ao seu time.</p>

    <section class="collaborator-list" id="equipeLista"></section>
  </main>

  <script src="gerenciar-colaboradores.js"></script>
</body>
</html>
