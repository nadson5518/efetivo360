<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Efetivo360 | Transferir Colaboradores</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body class="app-body">
  <header class="app-header">
    <div class="header-left">
      <img src="assets/logo-efetivo360.png" alt="Efetivo360" />
      <span class="page-title">Transferir Colaboradores</span>
    </div>
    <div class="header-right">
      <span class="user-name" id="transferUserNome">Usuário</span>
      <span class="user-role">Líder</span>
    </div>
  </header>

  <main class="dashboard-container">
    <h1>Transferência de Colaboradores</h1>
    <p class="subtitle">Gerencie colaboradores disponíveis e da sua equipe.</p>

    <section class="transfer-grid">
      <div class="transfer-card">
        <h2>Colaboradores Disponíveis</h2>
        <ul class="transfer-list" id="listaDisponiveis"></ul>
      </div>

      <div class="transfer-card">
        <h2>Minha Equipe</h2>
        <ul class="transfer-list" id="listaEquipe"></ul>
      </div>
    </section>
  </main>

  <script src="transferir-colaboradores.js"></script>
</body>
</html>
