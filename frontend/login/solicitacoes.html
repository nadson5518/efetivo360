<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Efetivo360 | Solicitações</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body class="app-body">
  <header class="app-header">
    <div class="header-left">
      <img src="assets/logo-efetivo360.png" alt="Efetivo360" />
      <span class="page-title">Solicitações</span>
    </div>
    <div class="header-right">
      <span class="user-name" id="solUserNome">Usuário</span>
      <span class="user-role" id="solUserPerfil">Perfil</span>
    </div>
  </header>

  <main class="dashboard-container">
    <h1>Solicitações</h1>
    <p class="subtitle">Envie solicitações para o administrador e acompanhe o status.</p>

    <section class="request-card">
      <h2>Nova Solicitação</h2>
      <form id="solicitacaoForm">
        <div class="form-group">
          <label for="solTipo">Tipo de Solicitação</label>
          <select id="solTipo" required>
            <option value="">Selecione o tipo</option>
            <option>Ajuste de Horário</option>
            <option>Correção de Status</option>
            <option>Alteração de RDC</option>
            <option>Alteração de Produção</option>
            <option>Outros</option>
          </select>
        </div>

        <div class="form-group">
          <label for="solData">Data de Referência</label>
          <input id="solData" type="date" required />
        </div>

        <div class="form-group">
          <label for="solDescricao">Descrição / Motivo</label>
          <textarea id="solDescricao" placeholder="Descreva detalhadamente a solicitação" required></textarea>
        </div>

        <div class="form-actions">
          <button class="secondary-btn" type="button" id="solCancelar">Cancelar</button>
          <button class="primary-btn" type="submit">Enviar Solicitação</button>
        </div>
      </form>
    </section>

    <section class="request-history">
      <h2>Minhas Solicitações</h2>
      <div id="solicitacoesLista"></div>
    </section>
  </main>

  <script src="solicitacoes.js"></script>
</body>
</html>
