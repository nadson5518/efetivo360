<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Efetivo360 | Histórico Geral</title>
  <link rel="stylesheet" href="../login/style.css" />
</head>

<body class="app-body">

<!-- ================= HEADER ================= -->
<header class="app-header">
  <div class="header-left">
    <img src="../login/assets/logo-efetivo360.png" alt="Efetivo360" />
    <span class="page-title">Histórico Geral</span>
  </div>
  <div class="header-right">
    <span class="user-name">Administrador</span>
    <span class="user-role">ADM</span>
  </div>
</header>

<!-- ================= CONTEÚDO ================= -->
<main class="dashboard-container">

<h1>Histórico Geral</h1>
<p class="subtitle">
  Registro completo de ações e alterações do sistema
</p>

<!-- ================= FILTROS ================= -->
<section class="filter-bar compact">

  <select id="filtroTipo" class="filter-select compact">
    <option value="">Tipo de Evento</option>
    <option>Login</option>
    <option>Paralisação</option>
    <option>Ajuste de Status</option>
    <option>Solicitação</option>
    <option>Produção</option>
    <option>RDC</option>
    <option>Meta</option>
    <option>Transferência</option>
  </select>

  <select class="filter-select compact">
    <option value="">Lançado por</option>
    <option>Administrador (ADM)</option>
    <option>Carlos Silva (Líder)</option>
    <option>Lucas Rocha (Líder)</option>
  </select>

  <select class="filter-select compact">
    <option value="">Aprovado por</option>
    <option>Administrador (ADM)</option>
  </select>

  <input type="date" class="filter-input compact" />

  <!-- 🔴 SOMENTE CRÍTICOS -->
  <label class="critical-toggle">
    <input type="checkbox" id="onlyCritical" />
    <span>Somente críticos</span>
  </label>

</section>

<!-- ================= LISTA ================= -->
<section class="table-card">

<table class="data-table" id="historicoTable">
  <thead>
    <tr>
      <th>Data / Hora</th>
      <th>Evento</th>
      <th>Lançado por</th>
      <th>Aprovado por</th>
      <th>Descrição</th>
      <th>Detalhes</th>
    </tr>
  </thead>

  <tbody></tbody>

</table>

</section>

</main>

<!-- ================= SCRIPT ================= -->
<script src="historico.js"></script>

</body>
</html>
