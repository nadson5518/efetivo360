<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Efetivo360 | Registrar Produção</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body class="app-body">

  <!-- HEADER -->
  <header class="app-header">
    <div class="header-left">
      <img src="assets/logo-efetivo360.png" alt="Efetivo360" />
      <span class="page-title">Registrar Produção</span>
    </div>

    <div class="header-right">
      <span class="user-name">Usuário Exemplo</span>
      <span class="user-role">Líder</span>
    </div>
  </header>

  <!-- CONTEÚDO -->
  <main class="dashboard-container">

    <h1>Registrar Produção</h1>
    <p class="subtitle">
      Informe a produção realizada no dia
    </p>

    <!-- FORMULÁRIO -->
    <section class="production-card">

      <div class="form-group">
        <label>Data</label>
        <input id="prodData" type="date" />
      </div>

      <div class="form-group">
        <label>Grupo</label>
        <select id="prodGrupo">
          <option value="">Selecione o grupo</option>
          <option>Grupo 01 — Área A</option>
          <option>Grupo 02 — Galpão B</option>
        </select>
      </div>

      <div class="form-group">
        <label>Atividade</label>
        <input id="prodAtividade" type="text" value="Pintura Estrutural" />
      </div>

      <div class="form-group">
        <label>Quantidade Produzida</label>
        <input id="prodQuantidade" type="number" placeholder="Ex: 120" />
      </div>

      <div class="form-group">
        <label>Unidade</label>
        <select id="prodUnidade">
          <option>m²</option>
          <option>un</option>
          <option>kg</option>
        </select>
      </div>

      <div class="form-group">
        <label>Observação</label>
        <textarea id="prodObservacao" placeholder="Observações sobre a produção"></textarea>
      </div>

      <div class="form-actions">
        <button id="btnCancelarProducao" type="button" class="secondary-btn">Cancelar</button>
        <button id="btnSalvarProducao" type="button" class="primary-btn">Registrar Produção</button>
      </div>

    </section>

  </main>

  <script src="registrar-producao.js"></script>
</body>
</html>
