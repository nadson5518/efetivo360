<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Efetivo360 | Gerenciar Metas</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body class="app-body">

  <!-- HEADER -->
  <header class="app-header">
    <div class="header-left">
      <img src="assets/logo-efetivo360.png" alt="Efetivo360" />
      <span class="page-title">Gerenciar Metas</span>
    </div>

    <div class="header-right">
      <span class="user-name">Usuário Exemplo</span>
      <span class="user-role">Líder</span>
    </div>
  </header>

  <!-- CONTEÚDO -->
  <main class="dashboard-container">

    <h1>Metas</h1>
    <p class="subtitle">
      Acompanhe suas metas e as metas da disciplina
    </p>

    <!-- METAS DO LÍDER -->
    <section class="goals-section">
      <h2>🧑‍🏭 Minhas Metas</h2>

      <div class="goals-list">

        <div class="goal-card">
          <div class="goal-header">
            <div>
              <strong>Meta Diária</strong>
              <span class="goal-info">Líder: Carlos Silva</span>
            </div>
            <span class="goal-percent success">80%</span>
          </div>

          <div class="goal-progress">
            <div class="progress-bar">
              <div class="progress-fill success" style="width: 80%;"></div>
            </div>
            <div class="goal-values">
              <span>Produção: 80</span>
              <span>Meta: 100</span>
            </div>
          </div>
        </div>

      </div>
    </section>

    <!-- METAS DA DISCIPLINA -->
    <section class="goals-section">
      <h2>🧩 Metas da Disciplina</h2>

      <div class="goals-list">

        <div class="goal-card">
          <div class="goal-header">
            <div>
              <strong>Meta Mensal</strong>
              <span class="goal-info">Disciplina: Pintura</span>
            </div>
            <span class="goal-percent warning">45%</span>
          </div>

          <div class="goal-progress">
            <div class="progress-bar">
              <div class="progress-fill warning" style="width: 45%;"></div>
            </div>
            <div class="goal-values">
              <span>Produção: 450</span>
              <span>Meta: 1000</span>
            </div>
          </div>
        </div>

      </div>
    </section>

  </main>

</body>
</html>
